substitutions:
  name: battery-ks-bms
  friendly_name: Battery KS BMS
  bms_mac: "AA:BB:CC:DD:EE:FF"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: esp-idf

external_components:
  - source: github://syssi/esphome-ks-bms

logger:
  level: DEBUG

api:

ota:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

esp32_ble_tracker:
  scan_parameters:
    active: true

ble_client:
  - mac_address: ${bms_mac}
    id: client0

switch:
  - platform: ble_client
    ble_client_id: client0
    name: "${friendly_name} BLE Enabled"
    restore_mode: RESTORE_DEFAULT_ON

ks_bms:
  - id: bms0
    ble_client_id: client0
    update_interval: 15s

sensor:
  - platform: ks_bms
    ks_bms_id: bms0
    total_voltage:
      name: "${friendly_name} Total Voltage"
    current:
      name: "${friendly_name} Current"
    battery_level:
      name: "${friendly_name} State of Charge"
    temperature_1:
      name: "${friendly_name} Temperature 1"
    temperature_2:
      name: "${friendly_name} Temperature 2"
    min_cell_voltage:
      name: "${friendly_name} Min Cell Voltage"
    max_cell_voltage:
      name: "${friendly_name} Max Cell Voltage"
    delta_cell_voltage:
      name: "${friendly_name} Cell Delta"
    charging_power:
      name: "${friendly_name} Charging Power"
    discharging_power:
      name: "${friendly_name} Discharging Power"

binary_sensor:
  - platform: ks_bms
    ks_bms_id: bms0
    charging:
      name: "${friendly_name} Charging"
    discharging:
      name: "${friendly_name} Discharging"

text_sensor:
  - platform: ks_bms
    ks_bms_id: bms0
    errors:
      name: "${friendly_name} Errors"

# Notes:
# - Replace AA:BB:CC:DD:EE:FF with the real BMS BLE MAC discovered from scanning.
# - If you used the touchscreen/display Bluetooth MAC, this may never connect.
# - Service/characteristic discovery for the working setup matched FF00 / FF01 / FF02.
